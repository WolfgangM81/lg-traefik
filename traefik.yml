# Traefik Configuration
api:
  dashboard: true
  insecure: true  # Disable in production

# /ping endpoint für `traefik healthcheck --ping` Healthcheck im Container.
ping: {}

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
  file:
    filename: "/etc/traefik/dynamic.yml"
    watch: true

log:
  level: DEBUG

accessLog: {}
