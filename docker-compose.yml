services:
  traefik:
    container_name: lg-infra-traefik
    image: traefik:v3.0
    restart: unless-stopped
    user: "0:0"
    ports:
      - "${TRAEFIK_HTTP_PORT:-80}:80"
      - "${TRAEFIK_HTTPS_PORT:-443}:443"
      - "${TRAEFIK_DASHBOARD_PORT:-8080}:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic.yml:/etc/traefik/dynamic.yml:ro
    networks:
      - lg-public
      - lg-internal
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.lg.local`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=web"
      # OrbStack Integration (optional - für Port 80 ohne Konfiguration)
      # Funktioniert nur mit OrbStack, wird von Docker Desktop ignoriert
      - "dev.orbstack.domains=admin.lg.local,api.lg.local,traefik.lg.local"
      - "homepage.group=lg — Infra"
      - "homepage.name=lg Traefik"
      - "homepage.icon=traefik"
      - "homepage.href=http://traefik.lg.local:8480"
      - "homepage.description=Reverse proxy — Dashboard on port 8081 (side-by-side) / 8080 (default)"
    healthcheck:
      test: ["CMD-SHELL", "traefik healthcheck --ping || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

networks:
  lg-public:
    external: true
  lg-internal:
    external: true
